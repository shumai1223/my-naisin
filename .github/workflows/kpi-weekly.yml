name: KPI Weekly Digest

on:
  schedule:
    # 毎週日曜 午前9時（JST）= UTC 日曜0時。GSC週次レポート（月曜）と日をずらす。
    - cron: '0 0 * * 0'
  workflow_dispatch: # 手動実行も可能

jobs:
  kpi-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate KPI weekly digest
        id: kpi
        run: npx tsx src/scripts/kpi-report.ts

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kpi-weekly-digest
          path: kpi-weekly-report.md
          retention-days: 90

      - name: Create issue with digest
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('kpi-weekly-report.md', 'utf8');
            const date = '${{ steps.kpi.outputs.report_date }}';
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📈 週次 運用ダイジェスト: ${date}`,
              body,
              labels: ['kpi', 'automated', 'monetization']
            });
