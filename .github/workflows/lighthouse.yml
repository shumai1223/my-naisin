name: Lighthouse CWV

# Core Web Vitals（LCP/CLS/TBT）を継続計測。framer-motion 撤去や重い変更の前後で回帰を検知する。
# 本番URLに対して実行（プレビューデプロイ不要）。週次＋手動。

on:
  schedule:
    - cron: '0 23 * * 0' # 毎週月曜 午前8時(JST) = 日曜23:00 UTC
  workflow_dispatch:
    inputs:
      url:
        description: '計測する単一URL（省略時は主要ページ一式）'
        required: false

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse
        id: lighthouse
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          # ZZ-8c（2026-07-24）：主要4面→10面に拡張。冬KWマップ(docs/winter-kw-map-2026.md)で
          # 特定した総合得点47県クラスタの優先面(tokyo/osaka)・S値(神奈川・季節倍率11.7xで最重要)・
          # 主要リンカブル資産(naishin-kakusa/白書/stats)を追加。
          urls: |
            https://my-naishin.com/
            https://my-naishin.com/hensachi
            https://my-naishin.com/hyotei-heikin
            https://my-naishin.com/tokyo/naishin
            https://my-naishin.com/tokyo/total-score
            https://my-naishin.com/osaka/total-score
            https://my-naishin.com/kanagawa/s-value
            https://my-naishin.com/naishin-kakusa
            https://my-naishin.com/report/2026
            https://my-naishin.com/stats
          # モバイル実機相当（受験トラフィックの約7割がモバイル）で計測。
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      # LCP退行アラート（H-2）：.lighthouserc.json で largest-contentful-paint を
      # error 判定にしているため、2500msを超えるとこのステップの outcome が failure になる。
      # continue-on-error で一旦通してレポートのuploadは必ず走らせつつ、ここでIssue化して見逃さないようにする。
      - name: Create issue on LCP regression
        if: steps.lighthouse.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Lighthouse CWV: LCP退行を検知 (${new Date().toISOString().slice(0, 10)})`,
              body: [
                'Lighthouse CI で largest-contentful-paint が閾値(2500ms)を超えました（.lighthouserc.json）。',
                '',
                `詳細: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '直近の変更（framer-motion追加・重い画像・render-blockingスクリプト等）を疑ってください。'
              ].join('\n'),
              labels: ['performance', 'automated']
            });

      # 検知後もJobを赤くして見逃し防止（レポートは上のステップで既にuploadされている）。
      - name: Fail job if LCP regressed
        if: steps.lighthouse.outcome == 'failure'
        run: exit 1
