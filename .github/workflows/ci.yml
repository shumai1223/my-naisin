name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:ci

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Data consistency check
        run: npm run check:consistency
      - name: Forbidden words check
        run: npm run check:forbidden
      - name: Orphan page report (internal links)
        run: npm run check:orphans

  # ── 毎push CI は test + quality（決定論・常に緑になれる）だけに絞る ──
  # link-check（教委URLの死活＝外部HTTPで偽陽性が出やすい）は source-check-weekly.yml が
  #   毎週 continue-on-error + 失敗時Issue通知で実行（毎pushで赤くしない方が正しい運用）。
  # e2e（Playwright・dev サーバのコールドcompileで不安定）はローカル `npm run test:e2e` で随時。
  #   コアの回帰は jest(556) + typecheck + Cloudflare本番ビルドでカバー。
