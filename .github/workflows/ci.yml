name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:ci

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Data consistency check
        run: npm run check:consistency
      - name: Forbidden words check
        run: npm run check:forbidden
      - name: Orphan page report (internal links)
        run: npm run check:orphans

  e2e:
    runs-on: ubuntu-latest
    env:
      # 塾ダッシュボードのデモ環境(ZZ-4e・build-not-launch)をこのCI検証ビルドでのみ有効化する。
      # Cloudflare本番のビルド設定とは別物（本番は未設定＝既定off）。既存の他ページの描画には
      # 影響しない（このNEXT_PUBLIC旗を参照するのは/juku/dashboard(/demo)のみ）。
      NEXT_PUBLIC_JUKU_SAAS_ENABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build (production)
        run: npm run build
      - name: Run e2e smoke (main funnel)
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload sales screenshots (ZZ-4e：塾ダッシュボードデモのスクリーンショットツアー)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: juku-dashboard-demo-screenshots
          path: sales-screenshots/
          retention-days: 30
          if-no-files-found: warn

  # ── 毎push CI は test + quality + e2e（決定論・常に緑になれる）だけに絞る ──
  # link-check（教委URLの死活＝外部HTTPで偽陽性が出やすい）は source-check-weekly.yml が
  #   毎週 continue-on-error + 失敗時Issue通知で実行（毎pushで赤くしない方が正しい運用）。
  # e2e は2026-07-17にCI化（W-18①）。旧コメントで挙げていた「devサーバのコールドコンパイルで
  #   不安定」という懸念は、playwright.config.ts側でCI時のみ`next build`済み成果物を
  #   `next start`で配信する構成に変更して解消（ビルドはこのジョブの専用ステップで先に実行）。
