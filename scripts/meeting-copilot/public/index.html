<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>商談副操縦士</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif; background: #0f1420; color: #e6e9f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; gap: 12px; padding: 8px 14px; background: #171e2e; border-bottom: 1px solid #263049; }
  header h1 { font-size: 15px; font-weight: 800; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #263049; }
  .badge.ok { background: #14532d; color: #86efac; }
  .badge.warn { background: #713f12; color: #fde047; }
  main { flex: 1; display: grid; grid-template-columns: 46% 54%; min-height: 0; }
  section { display: flex; flex-direction: column; min-height: 0; padding: 10px; gap: 8px; }
  section.left { border-right: 1px solid #263049; }
  .panel-title { font-size: 12px; font-weight: 700; color: #8b96ad; letter-spacing: .05em; }
  #transcript { flex: 1; overflow-y: auto; background: #131a29; border: 1px solid #263049; border-radius: 10px; padding: 10px; font-size: 14px; line-height: 1.7; }
  #transcript .line { margin-bottom: 4px; }
  #transcript .t { color: #5b6780; }
  #transcript .time { color: #5b6780; font-size: 11px; margin-right: 6px; }
  #interim { color: #7dd3fc; font-style: italic; min-height: 1.4em; font-size: 13px; padding: 0 4px; }
  .row { display: flex; gap: 6px; }
  input[type=text] { flex: 1; background: #131a29; border: 1px solid #2c3a52; border-radius: 8px; color: #e6e9f0; padding: 8px 10px; font-size: 14px; }
  button { border: 0; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; background: #263049; color: #e6e9f0; }
  button.primary { background: #2563eb; }
  button.rec { background: #dc2626; }
  button:disabled { opacity: .5; cursor: default; }
  #suggestions { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .card { background: #131a29; border: 1px solid #263049; border-radius: 10px; padding: 10px 12px; font-size: 15px; line-height: 1.75; white-space: pre-wrap; }
  .card.ai { border-left: 3px solid #2563eb; }
  .card .meta { font-size: 11px; color: #5b6780; margin-bottom: 4px; }
  .card.loading { color: #7dd3fc; }
  .card .bridge { font-size: 19px; font-weight: 700; color: #7dd3fc; line-height: 1.6; }
  .card .bridge small { display: block; font-size: 11px; font-weight: 400; color: #5b6780; margin-top: 3px; }
  details { background: #131a29; border: 1px solid #263049; border-radius: 10px; padding: 6px 10px; }
  details summary { cursor: pointer; font-size: 13px; font-weight: 700; padding: 4px 0; color: #cbd5e1; }
  details .body { font-size: 14px; line-height: 1.75; padding: 6px 2px 8px; white-space: pre-wrap; color: #e6e9f0; }
  .canned-wrap { display: flex; flex-direction: column; gap: 6px; max-height: 42%; overflow-y: auto; }
</style>
</head>
<body>
<header>
  <h1>🎙️ 商談副操縦士</h1>
  <span id="micBadge" class="badge">マイク: OFF</span>
  <span id="aiBadge" class="badge warn">AI: 起動中…</span>
  <span class="badge" style="margin-left:auto">スピーカー出音で相手の声も拾う / 保存なし</span>
</header>
<main>
  <section class="left">
    <div class="panel-title">会話ログ（自動文字起こし・編集はできないが手入力で追記可）</div>
    <div id="transcript"></div>
    <div id="interim"></div>
    <div class="row">
      <button id="micBtn">🎙️ 文字起こし開始</button>
      <input type="text" id="manualInput" placeholder="聞き取れなかった発言を手で追記 → Enter" />
    </div>
  </section>
  <section>
    <div class="panel-title">⚡ 即答スクリプト（遅延ゼロ・来るとわかってる質問はここ）</div>
    <div class="canned-wrap" id="canned"></div>
    <div class="panel-title" style="margin-top:4px">🤖 AIサジェスト（自動: 発言の区切りごとに毎回回答ヒントが流れる）</div>
    <div class="row">
      <button id="autoBtn" class="primary">🤖 自動回答: ON</button>
      <input type="text" id="askInput" placeholder="手動で聞きたい時だけ入力 → Ctrl+Enter" />
      <button id="suggestBtn">⚡ 手動</button>
    </div>
    <div id="suggestions"></div>
  </section>
</main>
<script>
// ---------- 即答スクリプト ----------
const CANNED = [

  ['📈 「数十万人規模でも大丈夫？」', '「インフラはCloudflareのグローバルエッジで動いているので負荷面は問題ありません。ライセンスは利用規模に応じた設計にしますので——まさにその想定人数を、ぜひ教えてください」\n※規模を聞き出すチャンス。値付け材料'],
  ['🔁 更新体制・キーマンリスク', '「各都道府県の教育委員会の公式発表、つまり一次ソースを直接参照し、毎年春の要項発表時期に全県を点検します。データ整合の自動テストもあり、属人的な目視には頼らない設計です。実際この1年、学業と並行して週次更新を続けてきた実績があります」'],
  ['✍️ 契約主体を聞かれた', '「未成年のため、契約はFP2級を持つ母を介して進めます。契約・決済（Stripe稼働済み）・税務まで、法人様との取引を想定した体制をすでに整えています」'],
  ['❓ こちらからの逆質問3本', '①「組み込み先のサービスと想定利用者数を教えてください」\n②「今回、どういうきっかけ・社内のどんな課題感でご連絡いただけたんですか？」\n③「導入までの社内プロセスと時期感を教えてください。どなたのご判断で進みますか？」'],
  ['📊 数字ファクト（盛らない）', '・Google検索経由 直近28日で約1万クリック（媒体資料の7,000は先週時点→「その後さらに伸びた」と言う）\n・単日最高1,630クリック（7/17通知表配布日＝平常の6.5倍・季節性を実測で語れる）\n・47都道府県すべての内申点計算に対応\n・ユーザーは中学生本人＋保護者の2層\n・提供形態: REST API / MCP / データセットの3つ・課金決済まで本番稼働済み\n・非金銭4点セット: 社名公表／製品内クレジット／出典リンク／共同リリース'],

  ['🔐 セキュリティ・個人情報は？', '「APIは計算方式という公知情報の提供で、生徒の個人情報を弊方が受け取らない設計にできます。具体的なセキュリティ要件はぜひ一度いただければ、持ち帰って回答します」'],
  ['🎯 合格可能性の判定もできる？', '「合否判定・学校別ボーダーは信頼方針としてあえて提供していません。弊方が出すのは内申点の計算エンジンと県別制度データまでで、判定ロジックは御社の模試データでこそ作れる部分だと思います」\n※相手の強みを立てつつ線を引く'],
  ['🏢 他社にも同じ提案を？', '「はい、複数の企業様にご案内しています。ただ、導入に至った企業様はまだなく、御社が第1号になる可能性が高い状況です」'],
  ['🤔 なぜベネッセに声をかけた？', '「御社の高校入試情報サイトは私自身も拝見してきました。47都道府県の入試情報を扱う大変さを一番ご存知の会社だと思ったからです」'],
  ['🏫 高校進学後の運営は？', '「高校でも運営は続けます。受験を終えた直後の運営者として、かえってユーザーに近い立場が保てると思っています」'],
  ['🧾 インボイス・支払サイト・NDA・解約条件', '「その点は前向きに対応したいと考えています。契約・税務まわりは保護者が窓口なので、正確を期して確認のうえ、明日のお見積もりに条件として明記してお送りします」\n※その場で「対応してます」と確約しない。決済はStripe(カード)稼働済みとだけ言ってよい'],
  ['📶 SLA・稼働率・応答速度の保証は？', '「Cloudflareのグローバルエッジ構成なので可用性は高いのですが、SLAとして何％を保証するかは商用ライセンスの設計と一緒に持ち帰らせてください。要件の水準を先に教えていただけますか？」\n※数値(99.9%や100ms等)をその場で言わない'],
  ['🎁 無償トライアル・「CSVで一回ください」', '「検証いただくのは大歓迎です。まずは数県分のサンプルデータと無料枠APIで検証いただき、本格検証はパイロット契約で、という形はいかがでしょう。無償期間には出典クレジットの表記をセットでお願いしたいです」\n※47県フルデータの無償渡し=商品そのものの無償譲渡。範囲限定+対価(クレジット)を必ず'],
  ['🛡️ ISMS・Pマークは取得してる？', '「認証は現時点で取得していません。ただAPIの設計上、生徒の個人情報を弊方が一切受け取らない構成にできるので、認証が担保する範囲の多くを構造で回避できます。必須要件でしたら詳細を伺って持ち帰ります」\n※「準備中」とは言わない(事実でない)'],
  ['🏫 学校名・本名を聞かれた', '「申し訳ありません、未成年ということもあり、学校名などの個人情報は非公開にさせていただいています。ご容赦ください。契約のお名前は保護者の國井になります」\n※学校の所在地(県名)も言わない。話題をデータ/体制に戻す'],
  ['⏰ 納期・「いつから使える？」', '「技術的な組み込み自体は重くないのですが、正確な工程は貴社側の要件(組込み先・認証・検収の進め方)次第なので、要件を伺った上で工程表をお出しします。冬の受験期に間に合わせる前提で逆算しましょう」\n※「2週間で稼働」等の期間の即答は禁止(捏造)'],
  ['🤝 クロージング(残り10分で必ず)', '「本日はありがとうございました。次のステップとして、①明日中にお見積もりと社内ご検討用の1枚資料をお送りします ②その上で、来週どこかで30分、技術面のすり合わせのお時間をいただけないでしょうか。ご都合いかがですか？」\n※次アポの日程候補をその場で確定させるのが目標。「お返事お待ちしてます」で終わらせない'],
];
const cannedWrap = document.getElementById('canned');
for (const [title, body] of CANNED) {
  const d = document.createElement('details');
  const s = document.createElement('summary');
  s.textContent = title;
  const b = document.createElement('div');
  b.className = 'body';
  b.textContent = body;
  d.append(s, b);
  cannedWrap.append(d);
}

// ---------- 文字起こし ----------
const transcriptEl = document.getElementById('transcript');
const interimEl = document.getElementById('interim');
const micBtn = document.getElementById('micBtn');
const micBadge = document.getElementById('micBadge');
const lines = []; // {time, text}
let sentCount = 0; // AIに送信済みの行数
let micOn = false;
let rec = null;

function addLine(text) {
  if (!text) return;
  const time = new Date().toTimeString().slice(0, 5);
  lines.push({ time, text });
  const div = document.createElement('div');
  div.className = 'line';
  const t = document.createElement('span');
  t.className = 'time';
  t.textContent = time;
  div.append(t, document.createTextNode(text));
  transcriptEl.append(div);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
  scheduleAuto();
}

function setupRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('このブラウザは音声認識非対応です。Chromeを使ってください'); return null; }
  const r = new SR();
  r.lang = 'ja-JP';
  r.continuous = true;
  r.interimResults = true;
  r.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const res = e.results[i];
      if (res.isFinal) addLine(res[0].transcript.trim());
      else interim += res[0].transcript;
    }
    interimEl.textContent = interim;
    if (interim !== interimText) { interimText = interim; interimChangedAt = Date.now(); }
    if (interim === '') specFiredThisUtterance = false; // 発話が途切れた→次の発話で1回だけ先読み許可
  };
  r.onend = () => { if (micOn) setTimeout(() => { try { r.start(); } catch {} }, 150); };
  r.onerror = (e) => { if (e.error === 'not-allowed') { micOn = false; renderMic(); alert('マイクの使用を許可してください'); } };
  return r;
}

function renderMic() {
  micBtn.textContent = micOn ? '⏸ 文字起こし停止' : '🎙️ 文字起こし開始';
  micBtn.className = micOn ? 'rec' : '';
  micBadge.textContent = 'マイク: ' + (micOn ? 'ON' : 'OFF');
  micBadge.className = 'badge' + (micOn ? ' ok' : '');
}

micBtn.onclick = () => {
  if (!rec) rec = setupRec();
  if (!rec) return;
  micOn = !micOn;
  if (micOn) { try { rec.start(); } catch {} } else { rec.stop(); interimEl.textContent = ''; }
  renderMic();
};

document.getElementById('manualInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { addLine('✍️ ' + e.target.value.trim()); e.target.value = ''; }
});

// ---------- AIサジェスト ----------
const suggestionsEl = document.getElementById('suggestions');
const suggestBtn = document.getElementById('suggestBtn');
const askInput = document.getElementById('askInput');
const aiBadge = document.getElementById('aiBadge');

async function pollHealth() {
  try {
    const h = await (await fetch('/health')).json();
    aiBadge.textContent = h.ready ? 'AI: 準備完了'
      : h.error ? 'AI: ⚠️ ' + h.error.slice(0, 60)
      : 'AI: 起動中…';
    aiBadge.className = 'badge' + (h.ready ? ' ok' : ' warn');
    if (h.ready) return;
  } catch {
    aiBadge.textContent = 'AI: サーバー未接続';
    aiBadge.className = 'badge warn';
  }
  setTimeout(pollHealth, 3000);
}
pollHealth();

// ---- 自動回答モード: 発言の区切り(短い沈黙)ごとに自動でAIへ流す ----
// Web Speech APIのisFinalが文の区切りを既に判定しているので、ここでの待ち時間は
// 短い連続発言をまとめて送るための微調整のみ。短くするほど体感が速くなる。
const AUTO_DEBOUNCE_MS = 350;
let autoOn = true;
let autoTimer = null;
const autoBtn = document.getElementById('autoBtn');

function scheduleAuto() {
  if (!autoOn) return;
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => suggest(true), AUTO_DEBOUNCE_MS);
}

autoBtn.onclick = () => {
  autoOn = !autoOn;
  autoBtn.textContent = '🤖 自動回答: ' + (autoOn ? 'ON' : 'OFF');
  autoBtn.className = autoOn ? 'primary' : '';
  if (autoOn) scheduleAuto();
};

// ---- 先読み(投機)発火: isFinal確定を待たずにAIへ流す ----
// Web Speechの確定(isFinal)は発話終了から0.5〜1.5秒遅れる。暫定文(interim)が
// SPEC_STABLE_MS動かなくなった時点=発言が止まった気配で先に生成を始め、後から来る確定文が
// 暫定文とほぼ同じなら再送しない(bigram Dice類似度)。違ったら普通に再送(先読みカードは上書きされる)。
const SPEC_STABLE_MS = 900;
const SPEC_MIN_CHARS = 10;
let interimText = '';
let interimChangedAt = 0;
let specPending = null; // 直近の先読み発火のテキスト(次の確定文と照合したらnullへ)
let specAt = 0;
// 発言が伸びるたび先読みが再発火して読んでいるカードを押し下げるのを防ぐ。
// 1つの発話(interimが途切れず伸び続けている間)につき先読みは1回だけ許す。
// 発話が途切れて次を話し始めたら(interimが一旦''になる)フラグを戻す。
let specFiredThisUtterance = false;

function normText(s) { return s.replace(/[\s、。．，・…？?！!「」()（）]/g, ''); }
function bigramCounts(s) { const m = new Map(); for (let i = 0; i < s.length - 1; i++) { const g = s.slice(i, i + 2); m.set(g, (m.get(g) || 0) + 1); } return m; }
function similarText(a, b) {
  a = normText(a); b = normText(b);
  if (!a || !b) return false;
  if (a === b) return true;
  const A = bigramCounts(a), B = bigramCounts(b);
  let inter = 0, sizeA = 0, sizeB = 0;
  for (const v of A.values()) sizeA += v;
  for (const v of B.values()) sizeB += v;
  for (const [g, v] of A) inter += Math.min(v, B.get(g) || 0);
  return sizeA + sizeB > 0 && (2 * inter) / (sizeA + sizeB) >= 0.8;
}

setInterval(() => {
  if (!autoOn || !micOn) return;
  if (specPending && Date.now() - specAt > 15_000) specPending = null; // 確定が来ないまま古びた先読みは破棄
  if (busy || !interimText || normText(interimText).length < SPEC_MIN_CHARS) return;
  if (specFiredThisUtterance) return; // この発話ではもう先読み済み(伸び続けても再発火しない)
  if (Date.now() - interimChangedAt < SPEC_STABLE_MS) return; // 発言がSPEC_STABLE_MS止まる=話し終えた気配になるまで待つ
  if (specPending && similarText(specPending, interimText)) return; // 同内容で二重発火しない
  specPending = interimText;
  specAt = Date.now();
  specFiredThisUtterance = true;
  suggest(true, interimText);
}, 200);

// つなぎ言葉: 生成待ちの~2秒を人間が自然に喋って埋めるための一言。
// 「そうですね」だけでは短すぎるので、2〜3秒ぶん話せる長さにする。連続で同じものが
// 出ないよう順送りする。中身はどれも「まだ何も答えていない」当たり障りのない相槌。
const BRIDGES = [
  'はい、ありがとうございます。そうですね……',
  'なるほど、そこは大事なところですね。ええと……',
  'そうですね、少し確認しながらお話ししますね。',
  'ありがとうございます。整理してお答えしますと、',
  'はい、その点ですね。ええ……',
  'いい質問をありがとうございます。そうですね、',
];
let bridgeIdx = 0;
function pickBridge() {
  const b = BRIDGES[bridgeIdx % BRIDGES.length];
  bridgeIdx++;
  return b;
}

let busy = false;
async function suggest(auto = false, interim = '') {
  // 確定文が直前の先読みとほぼ同じなら送らない(答えはもう出ている/出つつある)
  if (auto && !interim && specPending) {
    const newTexts = lines.slice(sentCount).map((l) => l.text).join('');
    if (newTexts && similarText(newTexts, specPending)) {
      sentCount = lines.length;
      specPending = null;
      return;
    }
  }
  if (busy) { if (auto && !interim) scheduleAuto(); return; } // 生成中に来た発言は終了後にまとめて再送
  const newLines = lines.slice(sentCount).map((l) => `${l.time} ${l.text}`);
  if (interim) newLines.push(`${new Date().toTimeString().slice(0, 5)} ${interim}`);
  const ask = auto ? '' : askInput.value.trim();
  if (newLines.length === 0 && !ask) return;
  sentCount = lines.length;
  if (!auto) askInput.value = '';
  if (!interim) specPending = null; // 通常送信が走ったら先読みの照合は不要になる
  busy = true;
  suggestBtn.disabled = true;

  const msg =
    (newLines.length ? `【会話ログ(新規分)】\n${newLines.join('\n')}\n\n` : '') +
    `【依頼】${ask || '自動モード: 直近の発言への回答ヒントを。'}`;

  const card = document.createElement('div');
  card.className = 'card ai loading';
  // 生成待ちの数秒を人間が喋って埋められるよう、0ms表示の「つなぎ言葉」を大きく出す。
  // TTFB(~1.9秒)は「そうですね」だけだと持たないので、2〜3秒ぶん喋れる長めの一言を用意する。
  const bridge = document.createElement('div');
  bridge.className = 'bridge';
  bridge.textContent = pickBridge();
  bridge.append(Object.assign(document.createElement('small'), { textContent: 'この一言を読んで間を作る→下に本回答が出ます' }));
  card.append(bridge);
  suggestionsEl.prepend(card);
  while (suggestionsEl.children.length > 10) suggestionsEl.lastChild.remove();

  try {
    const t0 = Date.now();
    const res = await fetch('/suggest', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ text: msg }),
    });
    if (!res.ok) {
      card.classList.remove('loading');
      card.textContent = await res.text();
    } else {
      // ストリーミング表示: 届いた端から描画する。つなぎ言葉(bridge)は最初のトークンが
      // 来るまで大きく残し、本回答が出始めたら小さく畳んで本文を主役にする。
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `${new Date().toTimeString().slice(0, 8)}${ask ? ' ・ ' + ask : ''}${interim ? ' ・ ⚡先読み(暫定文字起こしに基づく)' : ''} ・ ⏳`;
      const textNode = document.createTextNode('');
      card.append(meta, textNode);
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let first = true;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        if (first) { card.classList.remove('loading'); bridge.remove(); first = false; }
        textNode.textContent += dec.decode(value, { stream: true });
      }
      textNode.textContent += dec.decode();
      bridge.remove(); // トークンが1つも来なかった場合の保険(remove()は多重呼び出し安全)
      meta.textContent = meta.textContent.replace('⏳', `${((Date.now() - t0) / 1000).toFixed(1)}秒`);
      card.classList.remove('loading');
    }
  } catch (e) {
    card.classList.remove('loading');
    card.textContent = '❌ 通信エラー: ' + e.message;
  }
  busy = false;
  suggestBtn.disabled = false;
  if (autoOn && lines.length > sentCount) scheduleAuto(); // 生成中に溜まった発言を処理
}

suggestBtn.onclick = () => suggest(false);
document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'Enter') suggest(); });
</script>
</body>
</html>
