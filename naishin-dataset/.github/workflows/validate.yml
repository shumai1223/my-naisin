name: validate-dataset

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate dataset integrity
        run: node scripts/validate.mjs
      - name: Check JSON is parseable
        run: node -e "JSON.parse(require('fs').readFileSync('data/naishin-prefectures.json','utf8')); console.log('JSON OK')"
